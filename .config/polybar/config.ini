[colors]
background = #1e1e2e
foreground = #cdd6f4
alert = #f38ba8
green = #a6e3a1
yellow = #f9e2af
blue = #89b4fa
red = #f38ba8
cyan = #94e2d5
black = #000000
purple = #cba6f7
background-alt = #313244
disabled = #a89984

[bar/mainbar]
width = 100%
height = 25pt
radius = 8
bottom = false

separator = |

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 5pt
border-color = #00000000

padding-left = 0
padding-right = 1
module-margin = 1

font-0 = "HackNerdFontMono Font:size=12:file=/usr/share/fonts/TTF/HackNerdFontMono-Regular.ttf


modules-right =  shot clipboard time powermenu tray
modules-center = xwindow
modules-left = xworkspaces menu cpu 
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/powermenu]
type = custom/text
format = "пҖ‘"
formatf-background = ${colors.black}
format-foreground = ${colors.red}
click-left = ~/.config/rofi/power/launch.sh

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.cyan}

[module/time]
type = internal/date
interval = 1
time = %I:%M %p
label = %time%
label-foreground = ${colors.yellow}
format-prefix = "уұ‘’  "
format-prefix-foreground = ${colors.red}

[module/eth0]
type = custom/script
interval = 10
exec = "ip addr show eth0 | grep 'inet ' | awk '{print $2}' | cut -d/ -f1"
label = "у°ҲҖ  %output%"
label-foreground = ${colors.blue}

[module/menu]
type = custom/script
interval = 60
exec = "whoami"
label = " %output%"
click-left = rofi -show drun -theme '~/.config/rofi/app-launcher/launch.rasi'

[module/clipboard]
type = custom/text
format = "уұүЈ  Clipboard"
click-left = rofi -modi "clipboard:greenclip print" -show clipboard -run-command '{cmd}' -theme "~/.config/rofi/clipboard/clipboard.rasi"
format-foreground = ${colors.purple}

[module/shot]
type = custom/text
format = " о«І"
format-foreground = ${colors.green}
click-left = /home/john/.local/bin/screenshot.sh
#click-right = flameshot full -c

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "оҜў "
format-prefix-foreground = ${colors.yellow}
label = %percentage:2%%
label-foreground = ${colors.yellow}

[module/ctf]
type = custom/script
interval = 10
exec = ip link show tun0 > /dev/null 2>&1 && [ -f ~/target ] && echo "у°Ҷ§ $(cat ~/target)" || echo "у°Ҷ§ off"
label-foreground = ${colors.green}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.blue}

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/tray]
type = internal/tray
tray-position = right
tray-padding = 5

[settings]
screenchange-reload = true
pseudo-transparency = true



